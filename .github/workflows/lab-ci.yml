name: Lab CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke contract tests
        run: npm run test:smoke

      - name: Product policy onboarding
        run: |
          mkdir -p /tmp/bounded-agent-ci
          npm run product:policy -- --init --out /tmp/bounded-agent-ci/bounded-agent.policy.yml
          npm run product:policy -- --validate --policy /tmp/bounded-agent-ci/bounded-agent.policy.yml
          npm run product:policy -- --validate --policy bounded-agent.policy.yml

      - name: Product action artifact smoke
        run: npm run product:action-smoke

      - name: Product MVP-1 pilot
        run: npm run product:pilot -- --out-dir /tmp/bounded-agent-ci/pilot --fail-on-regression

      - name: Product MVP-3 pilot
        run: npm run product:pilot-v3 -- --out-dir /tmp/bounded-agent-ci/pilot-v3 --fail-on-regression

      - name: Product pilot insights
        run: npm run product:pilot-insights -- --dir /tmp/bounded-agent-ci/pilot-v3 --out-dir /tmp/bounded-agent-ci/pilot-v3 --fail-on-missed-blocker

      - name: Product real PR pilot
        run: npm run product:real-pr-pilot -- --out-dir /tmp/bounded-agent-ci/real-pr-pilot --fail-on-regression

      - name: Product imported PR pilot
        run: npm run product:github-pr-pilot -- --out-dir /tmp/bounded-agent-ci/imported-pr-pilot --fail-on-regression

      - name: Product imported PR calibration
        run: npm run product:pr-calibration -- --out-dir /tmp/bounded-agent-ci/imported-pr-calibration --fail-on-runtime-drift

      - name: Demo eval
        # Bu adım gerçek model kalitesini ölçmez; mock pipeline'ın fixture, evaluator,
        # report ve manifest üretimini kırmadan çalıştığını doğrular.
        run: npm run eval:demo

      - name: Python worker syntax
        run: python -m py_compile apps/dllm-worker/worker.py

      - name: Worker smoke
        # Worker smoke gerçek dLLM gerektirmez. Ama TS orchestrator ile Python worker
        # arasındaki health/infill/conflict endpoint sözleşmesinin çalıştığını gösterir.
        run: |
          python apps/dllm-worker/worker.py &
          WORKER_PID=$!
          sleep 2
          npm run worker:smoke
          kill "$WORKER_PID"

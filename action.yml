name: "Bounded Agent Product Review"
description: "Review task + diff + policy inputs with the bounded-context product runtime."
inputs:
  task:
    description: "Path to a Markdown or JSON task file."
    required: true
  diff:
    description: "Path to a unified diff file."
    required: true
  policy:
    description: "Path to a JSON or simple YAML policy file."
    required: true
  output-dir:
    description: "Directory where JSON and Markdown artifacts will be written."
    required: false
    default: "reports/product-runtime"
  fail-on:
    description: "CI failure threshold: high, medium, or never."
    required: false
    default: "high"
  comment-marker:
    description: "Hidden marker used in generated PR comment artifacts."
    required: false
    default: "<!-- bounded-agent-review -->"
outputs:
  decision:
    description: "Runtime decision: approve, refuse, reject, remask_required, or human_review_required."
    value: ${{ steps.outputs.outputs.decision }}
  risk-level:
    description: "Risk level: low, medium, or high."
    value: ${{ steps.outputs.outputs.risk-level }}
  json-path:
    description: "Path to the JSON artifact."
    value: ${{ steps.outputs.outputs.json-path }}
  markdown-path:
    description: "Path to the Markdown artifact."
    value: ${{ steps.outputs.outputs.markdown-path }}
  comment-path:
    description: "Path to the generated PR comment Markdown artifact."
    value: ${{ steps.outputs.outputs.comment-path }}
  index-json-path:
    description: "Path to the generated product report index JSON artifact."
    value: ${{ steps.outputs.outputs.index-json-path }}
  index-markdown-path:
    description: "Path to the generated product report index Markdown artifact."
    value: ${{ steps.outputs.outputs.index-markdown-path }}
  team-metrics-json-path:
    description: "Path to the generated team metrics JSON artifact."
    value: ${{ steps.outputs.outputs.team-metrics-json-path }}
  team-metrics-markdown-path:
    description: "Path to the generated team metrics Markdown artifact."
    value: ${{ steps.outputs.outputs.team-metrics-markdown-path }}
  viewer-path:
    description: "Path to the generated static HTML artifact viewer."
    value: ${{ steps.outputs.outputs.viewer-path }}
runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm install
    - name: Build runtime
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm run build
    - name: Run bounded review
      id: review
      shell: bash
      run: |
        resolve_path() {
          case "$1" in
            /*) printf '%s\n' "$1" ;;
            *) printf '%s/%s\n' "${{ github.workspace }}" "$1" ;;
          esac
        }
        TASK_PATH="$(resolve_path "${{ inputs.task }}")"
        DIFF_PATH="$(resolve_path "${{ inputs.diff }}")"
        POLICY_PATH="$(resolve_path "${{ inputs.policy }}")"
        OUTPUT_DIR="$(resolve_path "${{ inputs.output-dir }}")"
        mkdir -p "$OUTPUT_DIR"
        node "${{ github.action_path }}/dist/apps/cli/src/product-review.js" \
          --task "$TASK_PATH" \
          --diff "$DIFF_PATH" \
          --policy "$POLICY_PATH" \
          --out-dir "$OUTPUT_DIR" \
          --format json \
          --fail-on never > "$OUTPUT_DIR/summary.json"
        cat "$OUTPUT_DIR/summary.json"
    - name: Generate bounded review comment artifact
      shell: bash
      run: |
        case "${{ inputs.output-dir }}" in
          /*) OUTPUT_DIR="${{ inputs.output-dir }}" ;;
          *) OUTPUT_DIR="${{ github.workspace }}/${{ inputs.output-dir }}" ;;
        esac
        SUMMARY_PATH="$OUTPUT_DIR/summary.json"
        REVIEW_JSON="$(node -e '
          const fs = require("node:fs");
          const summary = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          process.stdout.write(summary.jsonPath);
        ' "$SUMMARY_PATH")"
        node "${{ github.action_path }}/dist/apps/cli/src/product-comment.js" \
          --review "$REVIEW_JSON" \
          --out "$OUTPUT_DIR/pr-comment.md" \
          --marker "${{ inputs.comment-marker }}"
    - name: Generate bounded review report index
      shell: bash
      run: |
        case "${{ inputs.output-dir }}" in
          /*) OUTPUT_DIR="${{ inputs.output-dir }}" ;;
          *) OUTPUT_DIR="${{ github.workspace }}/${{ inputs.output-dir }}" ;;
        esac
        node "${{ github.action_path }}/dist/apps/cli/src/product-report-index.js" \
          --dir "$OUTPUT_DIR" \
          --out-dir "$OUTPUT_DIR"
    - name: Generate bounded review team metrics and viewer
      shell: bash
      run: |
        case "${{ inputs.output-dir }}" in
          /*) OUTPUT_DIR="${{ inputs.output-dir }}" ;;
          *) OUTPUT_DIR="${{ github.workspace }}/${{ inputs.output-dir }}" ;;
        esac
        node "${{ github.action_path }}/dist/apps/cli/src/product-team-metrics.js" \
          --dir "$OUTPUT_DIR" \
          --out-dir "$OUTPUT_DIR"
        node "${{ github.action_path }}/dist/apps/cli/src/product-artifact-viewer.js" \
          --dir "$OUTPUT_DIR" \
          --out "$OUTPUT_DIR/index.html" \
          --title "Bounded Agent PR Review"
    - name: Export outputs
      id: outputs
      shell: bash
      run: |
        case "${{ inputs.output-dir }}" in
          /*) SUMMARY_PATH="${{ inputs.output-dir }}/summary.json" ;;
          *) SUMMARY_PATH="${{ github.workspace }}/${{ inputs.output-dir }}/summary.json" ;;
        esac
        node -e '
          const fs = require("node:fs");
          const summary = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `decision=${summary.decision}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `risk-level=${summary.riskLevel}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `json-path=${summary.jsonPath}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `markdown-path=${summary.markdownPath}\n`);
          const outputDir = process.argv[2];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `comment-path=${outputDir}/pr-comment.md\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `index-json-path=${outputDir}/product-report-index.json\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `index-markdown-path=${outputDir}/product-report-index.md\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `team-metrics-json-path=${outputDir}/team-metrics.json\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `team-metrics-markdown-path=${outputDir}/team-metrics.md\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `viewer-path=${outputDir}/index.html\n`);
        ' "$SUMMARY_PATH" "$(dirname "$SUMMARY_PATH")"
    - name: Apply fail threshold
      shell: bash
      run: |
        case "${{ inputs.output-dir }}" in
          /*) SUMMARY_PATH="${{ inputs.output-dir }}/summary.json" ;;
          *) SUMMARY_PATH="${{ github.workspace }}/${{ inputs.output-dir }}/summary.json" ;;
        esac
        node -e '
          const fs = require("node:fs");
          const summary = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          const failOn = process.argv[2];
          const risk = summary.riskLevel;
          const shouldFail = failOn === "high"
            ? risk === "high"
            : failOn === "medium"
              ? risk === "high" || risk === "medium"
              : false;
          if (shouldFail) {
            console.error(`Bounded review failed because risk=${risk} and fail-on=${failOn}.`);
            process.exit(1);
          }
        ' "$SUMMARY_PATH" "${{ inputs.fail-on }}"
